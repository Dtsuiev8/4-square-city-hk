  <!DOCTYPE html>
  <html lang="zh-Hant-HK">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <title>香港人四方城 - 大亨充值版</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
      <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
      <style>
          :root { --mj-green: #064e3b; }
          body { background-color: var(--mj-green); font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
          .mj-table { background: radial-gradient(circle, #065f46 0%, #064e3b 100%); height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
          
          #live-counter { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); color: #fbbf24; padding: 8px 15px; border-radius: 20px; font-weight: bold; border: 1px solid #fbbf24; z-index: 100; }
          
          /* 大亨充值彈窗樣式 */
          #vip-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
          .vip-card { background: linear-gradient(135deg, #1f2937 0%, #111827 100%); border: 2px solid #fbbf24; border-radius: 20px; width: 100%; max-width: 350px; padding: 25px; text-align: center; color: white; box-shadow: 0 0 30px rgba(251, 191, 36, 0.4); }
          
          .tile { background: #fff; border-radius: 8px; box-shadow: 0 6px #ccc; width: 80px; height: 110px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; transition: transform 0.1s; margin-bottom: 20px; }
          .btn-action { background: linear-gradient(to bottom, #f59e0b, #d97706); color: white; padding: 12px 25px; border-radius: 999px; font-weight: bold; box-shadow: 0 4px #92400e; margin: 5px; }
          .btn-vip { background: linear-gradient(45deg, #fcd34d, #d97706); color: #450a0a; padding: 8px 15px; border-radius: 10px; font-weight: 800; position: absolute; top: 15px; right: 15px; z-index: 100; animation: pulse 2s infinite; }
          
          @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
          #reg-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; color: white; }
      </style>
  </head>
  <body>

      <!-- 充值大亨彈窗 -->
      <div id="vip-modal">
          <div class="vip-card">
              <h2 class="text-2xl font-bold text-yellow-400 mb-2">成為四方城大亨 👑</h2>
              <p class="text-gray-300 text-sm mb-6">解鎖專屬金色稱號 + 無限摸牌好運</p>
              
              <div class="bg-gray-800 p-4 rounded-lg mb-4 border border-yellow-600/50">
                  <p class="text-xs text-yellow-500 mb-1">方式 1：轉數快 (FPS)</p>
                  <p class="text-xl font-mono font-bold">94999 231</p>
              </div>

              <div class="bg-white p-2 rounded-lg mb-4 inline-block">
                  <p class="text-black text-[10px] mb-1 font-bold">方式 2：微信支付掃碼</p>
                  <!-- 這裡會顯示你上傳的二維碼圖片 -->
                  <img src="1000184754.jpg" alt="WeChat Pay" class="w-40 h-40 mx-auto">
              </div>

              <button onclick="closeVip()" class="w-full bg-gray-600 p-2 rounded-lg mt-2 font-bold">稍後再說</button>
              <p class="text-[10px] mt-4 text-gray-500">充值後請截圖並聯絡管理員開通</p>
          </div>
      </div>

      <!-- 登入介面 -->
      <div id="reg-overlay">
          <div class="bg-gray-800 p-8 rounded-2xl w-80 text-center border border-gray-600">
              <h1 class="text-3xl font-bold mb-6 text-yellow-500">四方城 🀄</h1>
              <input id="username" type="text" placeholder="輸入你的大名" class="w-full p-3 mb-4 text-black rounded-lg outline-none focus:ring-2 ring-yellow-500">
              <button onclick="joinGame()" class="w-full bg-green-600 hover:bg-green-500 p-4 rounded-lg font-bold text-xl transition-all">進入戰局</button>
          </div>
      </div>

      <div class="mj-table">
          <div id="live-counter">🔥 在線：<span id="online-count">0</span></div>
          <button onclick="openVip()" class="btn-vip">成為大亨 👑</button>

          <div id="current-tile" class="tile opacity-0">?</div>
          <div id="status-text" class="text-white text-lg mb-10 font-medium">摸張靚牌食糊啦！</div>

          <div class="flex">
              <button onclick="drawTile()" class="btn-action">摸牌 🀄</button>
              <button onclick="winGame()" class="btn-action bg-red-600 shadow-red-900 !from-red-500 !to-red-700">食糊 🏆</button>
          </div>
          
          <button onclick="toggleMusic()" id="music-btn" class="mt-8 text-gray-300 underline text-sm">🎵 背景音樂: OFF</button>
      </div>

      <audio id="bgm" loop src="bgm.aac"></audio>

      <script>
          // --- Firebase Config (請填入你自己的資料) ---
          const firebaseConfig = {
              apiKey: "你的API_KEY",
              authDomain: "你的PROJECT_ID.firebaseapp.com",
              databaseURL: "https://你的PROJECT_ID-default-rtdb.firebaseio.com",
              projectId: "你的PROJECT_ID",
              storageBucket: "你的PROJECT_ID.appspot.com",
              messagingSenderId: "你的SENDER_ID",
              appId: "你的APP_ID"
          };

          firebase.initializeApp(firebaseConfig);
          const db = firebase.database();
          let myName = "";
          let isMusicPlaying = false;

          const onlineRef = db.ref('online_players');
          
          function joinGame() {
              myName = document.getElementById('username').value.trim();
              if(!myName) return alert("話俾大家聽你叫咩名先！");
              const userRef = onlineRef.push();
              userRef.set({ name: myName, loginTime: Date.now() });
              userRef.onDisconnect().remove();
              document.getElementById('reg-overlay').style.display = 'none';
          }

          onlineRef.on('value', (snapshot) => {
              document.getElementById('online-count').innerText = snapshot.numChildren();
          });

          // 充值視窗控制
          function openVip() { document.getElementById('vip-modal').style.display = 'flex'; }
          function closeVip() { document.getElementById('vip-modal').style.display = 'none'; }

          const tiles = ['🀀','🀁','🀂','🀃','🀄','🀅','🀆','🀇','🀐','🀙'];
          function drawTile() {
              const t = tiles[Math.floor(Math.random() * tiles.length)];
              const el = document.getElementById('current-tile');
              el.innerText = t;
              el.style.opacity = '1';
              if(navigator.vibrate) navigator.vibrate(40);
          }

          function winGame() {
              if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 400]);
              alert("🏆 恭喜食糊！");
          }

          function toggleMusic() {
              const bgm = document.getElementById('bgm');
              const btn = document.getElementById('music-btn');
              if(!isMusicPlaying) { bgm.play(); btn.innerText = "🎵 背景音樂: ON"; }
              else { bgm.pause(); btn.innerText = "🎵 背景音樂: OFF"; }
              isMusicPlaying = !isMusicPlaying;
          }
      </script>
  </body>
  </html>
