  <!DOCTYPE html>
  <html lang="zh-Hant-HK">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <title>香港人四方城 - Live 在線版</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
      <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
      <style>
          :root { --mj-green: #064e3b; }
          body { background-color: var(--mj-green); font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
          .mj-table { background: radial-gradient(circle, #065f46 0%, #064e3b 100%); height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
          
          /* 在線人數樣式 */
          #live-counter { 
              position: absolute; top: 15px; left: 15px; 
              background: rgba(0,0,0,0.6); color: #fbbf24; 
              padding: 8px 15px; border-radius: 20px; 
              font-weight: bold; border: 1px solid #fbbf24;
              box-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
              z-index: 100; font-size: 1.1rem;
          }
          
          .tile { background: #fff; border-radius: 8px; box-shadow: 0 6px #ccc; width: 80px; height: 110px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; transition: transform 0.1s; margin-bottom: 20px; }
          .tile:active { transform: translateY(4px); box-shadow: 0 2px #ccc; }
          
          .btn-action { background: linear-gradient(to bottom, #f59e0b, #d97706); color: white; padding: 15px 30px; border-radius: 999px; font-weight: bold; box-shadow: 0 4px #92400e; margin: 10px; font-size: 1.2rem; }
          #reg-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; color: white; }
          
          #broadcast { position: absolute; top: 80px; width: 90%; text-align: center; color: #fff; background: rgba(220, 38, 38, 0.8); padding: 8px; border-radius: 10px; display: none; z-index: 99; animation: slideDown 0.5s; }
          @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      </style>
  </head>
  <body>

      <!-- 登入介面 -->
      <div id="reg-overlay">
          <div class="bg-gray-800 p-8 rounded-2xl w-80 text-center border border-gray-600">
              <h1 class="text-3xl font-bold mb-6 text-yellow-500">四方城 🀄</h1>
              <input id="username" type="text" placeholder="輸入你的大名" class="w-full p-3 mb-4 text-black rounded-lg outline-none focus:ring-2 ring-yellow-500">
              <button onclick="joinGame()" class="w-full bg-green-600 hover:bg-green-500 p-4 rounded-lg font-bold text-xl transition-all">進入戰局</button>
              <p class="mt-4 text-gray-400 text-sm">即時與全港雀友對戰</p>
          </div>
      </div>

      <div class="mj-table">
          <!-- 🔥 在線人數顯示 -->
          <div id="live-counter">🔥 在線人物：<span id="online-count">0</span></div>

          <!-- 即時廣播 -->
          <div id="broadcast"></div>

          <!-- 牌面 -->
          <div id="current-tile" class="tile opacity-0">?</div>
          <div id="status-text" class="text-white text-lg mb-10 font-medium">摸張靚牌食糊啦！</div>

          <!-- 操作 -->
          <div class="flex">
              <button onclick="drawTile()" class="btn-action">摸牌 🀄</button>
              <button onclick="winGame()" class="btn-action bg-red-600 shadow-red-900 !from-red-500 !to-red-700">食糊 🏆</button>
          </div>
          
          <button onclick="toggleMusic()" id="music-btn" class="mt-8 text-gray-300 underline text-sm">🎵 背景音樂: OFF</button>
      </div>

      <audio id="bgm" loop src="bgm.aac"></audio>

      <script>
          // --- 請在此填入你的 Firebase Config ---
          const firebaseConfig = {
              apiKey: "你的API_KEY",
              authDomain: "你的PROJECT_ID.firebaseapp.com",
              databaseURL: "https://你的PROJECT_ID-default-rtdb.firebaseio.com",
              projectId: "你的PROJECT_ID",
              storageBucket: "你的PROJECT_ID.appspot.com",
              messagingSenderId: "你的SENDER_ID",
              appId: "你的APP_ID"
          };

          firebase.initializeApp(firebaseConfig);
          const db = firebase.database();
          let myName = "";
          let isMusicPlaying = false;

          // --- Live 在線人數邏輯 ---
          const onlineRef = db.ref('online_players');
          
          function joinGame() {
              myName = document.getElementById('username').value.trim();
              if(!myName) return alert("話俾大家聽你叫咩名先！");

              // 1. 喺 Firebase 增加一個在線節點
              const userRef = onlineRef.push();
              userRef.set({ name: myName, loginTime: Date.now() });
              
              // 2. 重要：當玩家閂網頁，自動刪除呢個節點 (人數 -1)
              userRef.onDisconnect().remove();

              document.getElementById('reg-overlay').style.display = 'none';
              sendBroadcast(`👋 歡迎 ${myName} 加入四方城！`);
          }

          // 3. 監聽 Firebase 節點數量，即時更新畫面數字
          onlineRef.on('value', (snapshot) => {
              const count = snapshot.numChildren(); // 獲取節點總數
              document.getElementById('online-count').innerText = count;
          });

          // --- Live 廣播邏輯 ---
          const broadcastRef = db.ref('global_broadcast');
          function sendBroadcast(msg) {
              broadcastRef.set({ msg: msg, t: Date.now() });
          }

          broadcastRef.on('value', (snapshot) => {
              const data = snapshot.val();
              if(data) {
                  const b = document.getElementById('broadcast');
                  b.innerText = data.msg;
                  b.style.display = 'block';
                  setTimeout(() => b.style.display = 'none', 4000);
              }
          });

          // --- 遊戲操作 ---
          const tiles = ['🀀','🀁','🀂','🀃','🀄','🀅','🀆','🀇','🀐','🀙'];
          function drawTile() {
              const t = tiles[Math.floor(Math.random() * tiles.length)];
              const el = document.getElementById('current-tile');
              el.innerText = t;
              el.style.opacity = '1';
              if(navigator.vibrate) navigator.vibrate(40);
          }

          function winGame() {
              if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 400]);
              sendBroadcast(`🏆 賀！${myName} 食糊啦！全場震動！`);
              document.getElementById('status-text').innerText = "🎉 恭喜晒！你食咗糊！";
          }

          function toggleMusic() {
              const bgm = document.getElementById('bgm');
              const btn = document.getElementById('music-btn');
              if(!isMusicPlaying) {
                  bgm.play();
                  btn.innerText = "🎵 背景音樂: ON (3D Rap)";
                  btn.style.color = "#4ade80";
              } else {
                  bgm.pause();
                  btn.innerText = "🎵 背景音樂: OFF";
                  btn.style.color = "#d1d5db";
              }
              isMusicPlaying = !isMusicPlaying;
          }
      </script>
  </body>
  </html>
