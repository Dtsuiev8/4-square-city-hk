  <html lang="zh-Hant-HK">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
      <title>四方城 V18.7 | 山魈 官方版權保護系統</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <style>
          /* 🚨 終極反擊樣式 (專為 PNG 優化) */
          #strike-back {
              display: none;
              position: fixed;
              inset: 0;
              background: #000;
              z-index: 99999;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              overflow: hidden;
              cursor: none; /* 隱藏鼠標增加恐懼感 */
          }

          /* 警燈閃爍背景：紅藍極速交替 */
          .police-flash {
              animation: bg-flash 0.15s infinite;
          }
          @keyframes bg-flash {
              0% { background: #000; box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.8); }
              50% { background: #050505; box-shadow: inset 0 0 150px rgba(0, 0, 255, 0.8); }
              100% { background: #000; box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.8); }
          }

          /* PNG 圖片：超頻震動 + 紅色霓虹發光效果 */
          .strike-png {
              width: 85%;
              max-width: 500px;
              filter: drop-shadow(0 0 40px #ff0000) contrast(1.3) brightness(1.1);
              animation: ultra-shake 0.04s infinite;
          }
          @keyframes ultra-shake {
              0% { transform: translate(3px, 3px) rotate(0deg); }
              25% { transform: translate(-3px, -3px) rotate(1deg); }
              50% { transform: translate(-3px, 3px) rotate(-1deg); }
              75% { transform: translate(3px, -3px) rotate(0.5deg); }
              100% { transform: translate(0, 0) rotate(0deg); }
          }

          /* 警告文字樣式 */
          .warning-msg {
              color: #fff;
              font-family: 'Courier New', monospace;
              text-align: center;
              margin-top: 30px;
              text-transform: uppercase;
              text-shadow: 0 0 20px #ff0000;
          }

          /* 正常遊戲介面樣式 */
          .safe-zone {
              background: radial-gradient(circle, #1a4d2e 0%, #0a2616 100%);
              height: 100vh;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              position: relative;
          }

          /* 底部版權浮水印 */
          .copyright-footer {
              position: absolute;
              bottom: 20px;
              color: rgba(255, 255, 255, 0.3);
              font-family: sans-serif;
              font-size: 12px;
              letter-spacing: 1px;
              text-align: center;
          }
      </style>
  </head>
  <body class="bg-black">

      <!-- 🖕 偵測到侵權/追蹤時彈出嘅 PNG 反擊畫面 -->
      <div id="strike-back" class="police-flash">
          <!-- 核心：你準備好嘅 PNG 圖片 (需命名為 counter-attack.png) -->
          <img src="counter-attack.png" class="strike-png" alt="COPYRIGHT VIOLATION">
          
          <div class="warning-msg">
              <h1 class="text-4xl md:text-6xl font-black mb-4">COPYRIGHT INFRINGEMENT</h1>
              <p class="text-xl text-red-500 font-bold">偵測到非法追蹤及侵權行為</p>
              <div class="mt-8 text-[10px] opacity-40 font-mono">
                  © 2026 山魈 (MOUNTAIN DEMON) SECURITY PROTOCOL<br>
                  EVIDENCE LOGGED AND UPLOADED TO CLOUD.
              </div>
          </div>
      </div>

      <!-- 正常遊戲內容 (四方城主介面) -->
      <div id="main-content" class="safe-zone">
          <div class="text-center">
              <div class="mb-6 inline-block p-4 border-4 border-yellow-600 rounded-2xl bg-green-800 shadow-[0_0_30px_rgba(234,179,8,0.3)]">
                  <span class="text-7xl">🀄</span>
              </div>
              <h2 class="text-yellow-500 text-3xl font-black tracking-widest mb-2">四方城 V18.7</h2>
              <p class="text-green-400 font-mono text-sm animate-pulse">🛡️ 山魈 專屬版權保護啟動中</p>
          </div>
          
          <!-- 底部版權聲明 -->
          <div class="copyright-footer">
              <p>© 2026 版權持有人：山魈 (MOUNTAIN DEMON). 版權所有</p>
              <p class="text-[10px] mt-1 opacity-50">Securely Protected by Mountain Demon Protocol</p>
          </div>
      </div>

      <script>
          /**
           * 🛡️ 觸發版權反擊程序
           */
          function triggerStrike() {
              const strikeZone = document.getElementById('strike-back');
              const mainZone = document.getElementById('main-content');
              
              strikeZone.style.display = 'flex';
              mainZone.style.display = 'none';
              
              // 鎖死瀏覽器：進入 Alert 無限死循環
              setTimeout(() => {
                  while(true) {
                      alert("🚨 山魈 版權警告 🚨\n\n偵測到非法追蹤或代碼竊取行為！\n本系統受版權持有人「山魈 (Mountain Demon)」法律保護。\n你的 IP 地址及侵權證據已自動存檔並上傳至安全中心。");
                      window.location.reload(); // 強制刷新令其無法操作
                  }
              }, 500);
          }

          /**
           * 🛡️ 偵測手段 1：Debugger 陷阱 (對付 F12 最強招式)
           */
          setInterval(function() {
              const startTime = new Date().getTime();
              debugger; 
              const endTime = new Date().getTime();
              if (endTime - startTime > 100) {
                  triggerStrike();
              }
          }, 1000);

          /**
           * 🛡️ 偵測手段 2：禁止右鍵 (保護版權圖片及代碼)
           */
          document.addEventListener('contextmenu', (e) => {
              e.preventDefault();
              triggerStrike();
          });

          /**
           * 🛡️ 偵測手段 3：禁止開發者快捷鍵 (F12, Ctrl+Shift+I, Ctrl+U)
           */
          window.addEventListener('keydown', (e) => {
              // F12
              if (e.keyCode === 123) {
                  e.preventDefault();
                  triggerStrike();
              }
              // Ctrl + Shift + I / J / C
              if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
                  e.preventDefault();
                  triggerStrike();
              }
              // Ctrl + U (查看源代碼)
              if (e.ctrlKey && e.keyCode === 85) {
                  e.preventDefault();
                  triggerStrike();
              }
          });

          /**
           * 🛡️ 偵測手段 4：監控視窗大小變動 (模擬 F12 側欄彈出)
           */
          window.addEventListener('resize', () => {
              if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
                  triggerStrike();
              }
          });

          /**
           * 🛡️ 控制台版權聲明
           */
          console.log(
              "%c 🛡️ 版權持有人：山魈 (MOUNTAIN DEMON) %c 嚴禁非法追蹤及代碼竊取！",
              "background: #ff0000; color: #fff; font-size: 20px; font-weight: bold; padding: 4px 10px; border-radius: 5px;",
              "color: red; font-size: 16px; font-weight: bold;"
          );
      </script>
