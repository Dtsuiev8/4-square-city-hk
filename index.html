  <!DOCTYPE html>
  <html lang="zh-Hant-HK">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <title>香港人四方城 - 3D說唱對戰版</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
      <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
      <style>
          :root { --mj-green: #064e3b; }
          body { background-color: var(--mj-green); color: white; font-family: -apple-system, sans-serif; overflow: hidden; touch-action: manipulation; }
          .mj-table { background: radial-gradient(circle, #065f46 0%, #064e3b 100%); border: 10px solid #3d2b1f; border-radius: 24px; box-shadow: inset 0 0 60px rgba(0,0,0,0.6); }
          .tile { background: #fff; color: #000; width: 44px; height: 60px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; margin: 2px; border-bottom: 5px solid #bbb; border-right: 2px solid #ddd; cursor: pointer; transition: 0.1s; user-select: none; }
          .tile:active { transform: translateY(4px); border-bottom: 1px solid #bbb; }
          .tile.discarded { width: 32px; height: 44px; font-size: 1.5rem; border-bottom: 3px solid #bbb; margin: 1px; }
          #reg-overlay { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
          .btn-action { background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%); color: #451a03; font-weight: bold; box-shadow: 0 4px 0 #92400e; }
          .btn-win { background: linear-gradient(180deg, #ef4444 0%, #b91c1c 100%); color: white; box-shadow: 0 4px 0 #7f1d1d; }
          .winning-anim { animation: flash 0.6s infinite; color: #facc15; font-weight: bold; }
          @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
          .custom-scroll::-webkit-scrollbar { width: 4px; }
          .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
      </style>
  </head>
  <body class="p-2 flex flex-col items-center min-h-screen">

      <!-- 背景音樂 (請確保檔案名為 bgm.aac) -->
      <audio id="bg-music" loop>
          <source src="bgm.aac" type="audio/aac">
      </audio>

      <!-- 1. 玩家註冊介面 -->
      <div id="reg-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden">
          <div class="bg-white text-black p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center">
              <h2 class="text-3xl font-black mb-6 text-green-900">🀄 雀友登記</h2>
              <div class="space-y-4">
                  <input type="text" id="reg-name" class="w-full border-2 border-gray-200 p-4 rounded-2xl text-lg outline-none focus:border-green-600" placeholder="輸入你的大名">
                  <select id="reg-district" class="w-full border-2 border-gray-200 p-4 rounded-2xl text-lg outline-none">
                      <option value="觀塘">觀塘</option><option value="沙田">沙田</option><option value="旺角">旺角</option>
                      <option value="屯門">屯門</option><option value="元朗">元朗</option><option value="大埔">大埔</option>
                      <option value="荃灣">荃灣</option><option value="將軍澳">將軍澳</option><option value="銅鑼灣">銅鑼灣</option>
                      <option value="中西區">中西區</option><option value="其他">其他地區</option>
                  </select>
                  <button onclick="saveProfile()" class="w-full bg-green-700 text-white font-bold py-4 rounded-2xl text-xl shadow-lg active:scale-95 transition">開始對戰</button>
              </div>
          </div>
      </div>

      <!-- 2. 頂部資訊 -->
      <div class="w-full max-w-md flex justify-between items-end mb-2 px-2">
          <div>
              <h1 class="text-2xl font-black text-yellow-400 tracking-tight">香港人四方城</h1>
              <div class="flex items-center gap-2 mt-1">
                  <p id="player-info" class="text-[11px] text-green-200 bg-green-900/40 px-2 py-0.5 rounded-full border border-white/10">連線中...</p>
                  <button onclick="toggleMusic()" id="music-btn" class="text-[9px] bg-white/10 px-2 py-0.5 rounded-full border border-white/10">🎵 ON</button>
              </div>
          </div>
          <div class="text-right">
              <span class="text-[10px] opacity-50 block uppercase">Wall</span>
              <div id="deck-count" class="text-3xl font-black text-white leading-none">144</div>
          </div>
      </div>

      <!-- 3. 遊戲公海 -->
      <div class="w-full max-w-md mj-table p-3 min-h-[300px] mb-3 flex flex-col">
          <div id="discard-pile" class="flex flex-wrap content-start gap-1 flex-1 overflow-y-auto custom-scroll"></div>
      </div>

      <!-- 4. 我的手牌 -->
      <div class="w-full max-w-md bg-black/30 rounded-2xl p-3 mb-3 border border-white/10">
          <div class="flex justify-between items-center mb-2">
              <span class="text-xs font-bold text-yellow-500">我的手牌</span>
              <div class="flex gap-2">
                  <button onclick="sortHand()" class="text-[10px] bg-white/10 px-2 py-1 rounded-lg">理牌</button>
                  <button onclick="clearMyHand()" class="text-[10px] bg-red-900/20 px-2 py-1 rounded-lg text-red-200">清空</button>
              </div>
          </div>
          <div id="my-hand" class="flex flex-wrap justify-center min-h-[65px] gap-1"></div>
      </div>

      <!-- 5. 操作按鈕 -->
      <div class="w-full max-w-md flex flex-col gap-3 mb-3">
          <div class="flex gap-3">
              <button onclick="drawTile()" class="flex-[3] btn-action py-5 rounded-2xl text-2xl shadow-xl active:scale-95 transition">摸牌 🀄</button>
              <button onclick="winGame()" class="flex-1 btn-win py-5 rounded-2xl text-xl font-black active:scale-95 transition">食糊</button>
          </div>
          <button onclick="resetGame()" class="text-[10px] opacity-30 hover:opacity-100 transition">重新洗牌 (新局開始)</button>
      </div>

      <!-- 6. 系統紀錄 -->
      <div class="w-full max-w-md h-20 overflow-y-auto bg-black/50 rounded-xl p-2 text-[10px] font-mono border border-white/5 custom-scroll">
          <div id="game-logs" class="space-y-1"></div>
      </div>

      <script>
          // ==========================================
          // 1. 【核心設定】請在此貼上你的 Firebase Config
          // ==========================================
          const firebaseConfig = {
              apiKey: "你的API_KEY",
              authDomain: "你的PROJECT_ID.firebaseapp.com",
              databaseURL: "https://你的PROJECT_ID-default-rtdb.firebaseio.com",
              projectId: "你的PROJECT_ID",
              storageBucket: "你的PROJECT_ID.appspot.com",
              messagingSenderId: "你的SENDER_ID",
              appId: "你的APP_ID"
          };

          firebase.initializeApp(firebaseConfig);
          const db = firebase.database();
          const gameRef = db.ref('mahjong_hk_v7_music');

          let profile = JSON.parse(localStorage.getItem('mj_v7_profile'));
          const music = document.getElementById('bg-music');

          window.onload = () => {
              if (!profile) document.getElementById('reg-overlay').classList.remove('hidden');
              else {
                  updatePlayerDisplay();
                  // 如果已經註冊過，點擊頁面任何地方即播音樂
                  document.body.addEventListener('click', () => { if(music.paused) music.play(); }, {once: true});
              }
          };

          function saveProfile() {
              const name = document.getElementById('reg-name').value.trim();
              const district = document.getElementById('reg-district').value;
              if (!name) return alert("請輸入大名！");
              profile = { name, district };
              localStorage.setItem('mj_v7_profile', JSON.stringify(profile));
              document.getElementById('reg-overlay').classList.add('hidden');
              updatePlayerDisplay();
              
              // 啟動音樂
              music.volume = 0.3; 
              music.play().catch(e => console.log("等待交互播放"));
              
              addLog(`👋 [${profile.district}] ${profile.name} 加入咗四方城！`);
          }

          function toggleMusic() {
              const btn = document.getElementById('music-btn');
              if (music.paused) { music.play(); btn.innerText = "🎵 ON"; }
              else { music.pause(); btn.innerText = "🔇 OFF"; }
          }

          function updatePlayerDisplay() {
              document.getElementById('player-info').innerText = `📍 [${profile.district}] ${profile.name}`;
          }

          function vibrate(ms = 50) { if ("vibrate" in navigator) navigator.vibrate(ms); }

          const tileTypes = ["🀇","🀈","🀉","🀊","🀋","🀌","🀍","🀎","🀏","🀙","🀚","🀛","🀜","🀝","🀞","🀟","🀠","🀡","🀐","🀑","🀒","🀓","🀔","🀕","🀖","🀗","🀘","🀀","🀁","🀂","🀃","🀄","🀅","🀆"];

          function resetGame() {
              if(!confirm("確定重新洗牌？")) return;
              let deck = [];
              tileTypes.forEach(t => { for(let i=0; i<4; i++) deck.push(t); });
              deck.sort(() => Math.random() - 0.5);
              gameRef.set({
                  deck: deck, discards: [],
                  logs: [{msg: `📣 [${profile.district}] ${profile.name} 重新洗咗牌！`, time: Date.now()}]
              });
              document.getElementById('my-hand').innerHTML = "";
          }

          function drawTile() {
              vibrate(60);
              gameRef.child('deck').once('value', snapshot => {
                  let deck = snapshot.val();
                  if (!deck || deck.length === 0) return alert("冇晒牌！");
                  const tile = deck.pop();
                  gameRef.update({ deck: deck });
                  addLog(`🀄 [${profile.district}] ${profile.name} 摸咗牌`);
                  const el = document.createElement('div');
                  el.className = "tile";
                  el.innerText = tile;
                  el.onclick = () => { vibrate(40); if(confirm(`打出 【${tile}】？`)) discardTile(tile, el); };
                  document.getElementById('my-hand').appendChild(el);
              });
          }

          function discardTile(tile, el) {
              gameRef.child('discards').once('value', snapshot => {
                  let discards = snapshot.val() || [];
                  discards.push({tile, user: profile.name, district: profile.district});
                  gameRef.update({ discards });
                  addLog(`📤 [${profile.district}] ${profile.name} 打出 【${tile}】`);
                  el.remove();
              });
          }

          function winGame() {
              vibrate([200, 100, 200, 100, 300]);
              if(confirm("確定食糊？")) {
                  addLog(`🎉🎉🎉 [${profile.district}] ${profile.name} 食糊喇！！！ 🎉🎉🎉`);
              }
          }

          function addLog(msg) { gameRef.child('logs').push({ msg, time: Date.now() }); }

          function sortHand() {
              vibrate(30);
              const hand = document.getElementById('my-hand');
              const items = Array.from(hand.children);
              items.sort((a, b) => a.innerText.localeCompare(b.innerText, 'zh-Hans-CN-u-co-pinyin'));
              hand.innerHTML = "";
              items.forEach(i => hand.appendChild(i));
          }

          function clearMyHand() { if(confirm("清空手牌？")) document.getElementById('my-hand').innerHTML = ""; }

          gameRef.on('value', snapshot => {
              const data = snapshot.val();
              if (!data) return;
              document.getElementById('deck-count').innerText = data.deck ? data.deck.length : 0;
              const pile = document.getElementById('discard-pile');
              pile.innerHTML = "";
              if (data.discards) {
                  data.discards.forEach(item => {
                      const d = document.createElement('div');
                      d.className = "tile discarded";
                      d.innerText = item.tile;
                      pile.appendChild(d);
                  });
                  pile.scrollTop = pile.scrollHeight;
              }
              const logDiv = document.getElementById('game-logs');
              logDiv.innerHTML = "";
              if (data.logs) {
                  Object.values(data.logs).slice(-15).reverse().forEach(l => {
                      const div = document.createElement('div');
                      if (l.msg.includes('食糊')) div.className = "winning-anim";
                      div.innerHTML = `<span class="opacity-40 text-[9px]">${new Date(l.time).toLocaleTimeString()}</span> ${l.msg}`;
                      logDiv.appendChild(div);
                  });
              }
          });
      </script>
  </body>
  </html>
